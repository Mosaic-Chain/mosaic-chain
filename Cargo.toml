[workspace]
members = [
    "node",
    "pallets/nft-permission",
    "pallets/nft-staking",
    "pallets/nft-delegation",
    "pallets/validator-subset-selection",
    "runtime",
    "runtime/constants",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
repository = "https://gitlab.com/dlabs1/mozaik-chain"

[workspace.dependencies]
mosaic-chain-runtime = { version = "0.1.0", path = "runtime" }
mosaic-chain-runtime-constants = { version = "0.1.0", path = "runtime/constants" }
pallet-nft-staking = { version = "0.1.0", default-features = false, path = "pallets/nft-staking" }
pallet-nft-delegation = { version = "0.1.0", default-features = false, path = "pallets/nft-delegation" }
pallet-nft-permission = { version = "0.1.0", default-features = false, path = "pallets/nft-permission" }
pallet-validator-subset-selection = { version = "0.1.0", default-features = false, path = "pallets/validator-subset-selection" }
utils = { version = "0.1.0", path = "utils" }

[profile.release]
panic = "unwind"
