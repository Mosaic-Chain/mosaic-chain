[workspace]
members = [
    "pallets/doas",
    "node/parachain",
    "node/testnet-solo",
    "pallets/nft-delegation",
    "pallets/nft-permission",
    "pallets/nft-staking",
    "pallets/validator-subset-selection",
    "runtime/parachain",
    "runtime/testnet-solo",
    "runtime/testnet-solo/constants",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
repository = "https://gitlab.com/dlabs1/mozaik-chain"
edition = "2021"

[workspace.dependencies]

log = { version = "0.4.21", default-features = false }
serde = { version = "1.0.203", features = ["derive"], default-features = false }
serde_json = { version = "1.0.117", default-features = false }
codec = { package = "parity-scale-codec", version = "3.6.1", default-features = false }
clap = { version = "4.5.1" }
color-print = { version = "0.3.4" }
futures = { version = "0.3.30" }
hex-literal = { version = "0.4.1", default-features = false }
impl-trait-for-tuples = { version = "0.2.2" }
jsonrpsee = { version = "0.22" }
scale-info = { version = "2.11.1", default-features = false }
smallvec = { version = "1.11.2", default-features = false }

# Local
mosaic-testnet-solo-runtime = { version = "0.1.0", path = "runtime/testnet-solo" }
mosaic-testnet-solo-constants = { version = "0.1.0", path = "runtime/testnet-solo/constants" }
pallet-doas = { version = "0.1.0", default-features = false, path = "pallets/doas" }
pallet-nft-staking = { version = "0.1.0", default-features = false, path = "pallets/nft-staking" }
pallet-nft-delegation = { version = "0.1.0", default-features = false, path = "pallets/nft-delegation" }
pallet-nft-permission = { version = "0.1.0", default-features = false, path = "pallets/nft-permission" }
pallet-validator-subset-selection = { version = "0.1.0", default-features = false, path = "pallets/validator-subset-selection" }
utils = { version = "0.1.0", path = "utils" }
parachain-template-runtime = { version = "0.1.0", path = "runtime/parachain" }

# Substrate
