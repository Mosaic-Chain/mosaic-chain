stages:
  - test
  - release
  
.build-deps: &build-deps
  - apt update -y
  - apt upgrade -y
  - apt install build-essential git librocksdb-dev libsnappy-dev libclang-dev clang g++-multilib protobuf-compiler -y
  - rustup target add wasm32-unknown-unknown
  - rustup component add rust-src --toolchain 1.78.0-x86_64-unknown-linux-gnu

test:
  stage: test
  image: rust:1.78-bookworm
  script:
    - *build-deps
    - rustup component add rustfmt clippy
    - cargo install cargo-nextest
    - cargo fmt -- --check
    - cargo clippy --color=always --tests --examples --bins --benches --release --features runtime-benchmarks,try-runtime --no-deps -- -D warnings
    - cargo nextest run --release --features try-runtime -E "not (test(test_genesis_config_builds))" # These tests fail if mock runtime can't be built from *default* genesis config


.debian-repo-setup:
  stage: release
  image: rust:1.78-bookworm
  before_script:
   - *build-deps
   - apt install apt-transport-https ca-certificates gnupg curl -y
   - curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
   - echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
   - apt update -y && apt install google-cloud-cli -y
   - cargo install cargo-deb
   - gcloud auth activate-service-account --key-file $GCP_DEB_DEPLOY_JSON_KEY
   - gcloud config set core/project dlabs-317612
   - gcloud config set artifacts/location europe-west3
   - gcloud config set artifacts/repository deb-repo

debian-solo-rc:
  extends: .debian-repo-setup
  only:
    - develop
  script:
    - PKG=$(cargo deb -p mosaic-testnet-solo-node --profile release --variant rc --deb-version $(git describe --tags --match "[0-9]*" --always --dirty | sed "s/-/+/g"))
    - gcloud artifacts apt upload deb-repo --source $PKG

debian-solo-release:
  extends: .debian-repo-setup
  only:
    - main
  script:
    - PKG=$(cargo deb -p mosaic-testnet-solo-node --profile release --variant release)
    - gcloud artifacts apt upload deb-repo --source $PKG
   
debian-para-rc:
  extends: .debian-repo-setup
  only:
    - develop
  script:
    - PKG=$(cargo deb -p mosaic-chain-node --profile release --variant rc --deb-version $(git describe --tags --match "[0-9]*" --always --dirty | sed "s/-/+/g"))
    - gcloud artifacts apt upload deb-repo --source $PKG

debian-para-release:
  extends: .debian-repo-setup
  only:
    - main
  script:
    - PKG=$(cargo deb -p mosaic-chain-node --profile release --variant release)
    - gcloud artifacts apt upload deb-repo --source $PKG
