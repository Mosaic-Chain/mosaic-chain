variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: 0
  GIT_FETCH_EXTRA_ARGS: "--tags --prune --quiet"

stages:
  - test
  - publish
  - release-testnet
  - approve-testnet
  - release-devnet
  - approve-devnet
  - release-mainnet

include:
  - project: 'mosaic-chain/gitlab-ci-templates'
    file: '/clickup.yml'
    ref: main
  - project: 'mosaic-chain/gitlab-ci-templates'
    file: '/docker.yml'
    ref: main
  - project: "mosaic-chain/gitlab-ci-templates"
    file: "/approval.yml"
    ref: main

.build-deps: &build-deps
  - apt update -y
  - apt upgrade -y
  - apt install build-essential git librocksdb-dev libsnappy-dev libclang-dev clang g++-multilib protobuf-compiler -y
  - rustup target add wasm32-unknown-unknown
  - rustup component add rust-src --toolchain 1.88.0-x86_64-unknown-linux-gnu

test:
  stage: test
  image: rust:1.88.0-bookworm
  script:
    - *build-deps
    - rustup component add rustfmt clippy
    - cargo install --locked cargo-nextest@0.9.103
    - cargo install --locked cargo-deny@0.18.9
    - cargo install --locked zepter@1.82.1
    - ./scripts/check.sh

benchmark:
  stage: test
  when: manual
  image: rust:1.88.0-bookworm
  before_script:
    - apt update
    - apt install jq -y
    - mkdir -p ~/.ssh
    - ssh-keygen -t rsa -q -f ~/.ssh/id_rsa -N ""
    - export GITLAB_CI_PUBLIC_KEY=$(cat ~/.ssh/id_rsa.pub)

    - >
      curl --fail-with-body \
        -X POST \
        -H "Authorization: Bearer $HETZNER_API_KEY" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"mosaic-chain-benchmark-$CI_COMMIT_SHORT_SHA\",\"public_key\":\"$GITLAB_CI_PUBLIC_KEY\"}" \
        "https://api.hetzner.cloud/v1/ssh_keys" > ./create_ssh_key_response
    - export HETZNER_SSH_KEY_ID=$(cat ./create_ssh_key_response | jq -r '.ssh_key.id')
    - >
      curl --fail-with-body \
        -H "Authorization: Bearer $HETZNER_API_KEY" \
        -H "Content-Type: application/json" \
        -d "{ \"name\": \"mosaic-chain-benchmark-$CI_COMMIT_SHORT_SHA\", \"server_type\": \"cpx41\", \"location\": \"nbg1\", \"image\": \"debian-12\", \"ssh_keys\": [ $HETZNER_SSH_KEY_ID ] }" \
        -X POST \
        'https://api.hetzner.cloud/v1/servers' > ./create_server_response
    - export HETZNER_SERVER_ID=$(cat ./create_server_response | jq -r '.server.id')
    - export HETZNER_SERVER_IP=$(cat ./create_server_response | jq -r '.server.public_net.ipv4.ip')
    - 'echo "Created server with ID: $HETZNER_SERVER_ID"'

  after_script:
    - export HETZNER_SSH_KEY_ID=$(cat ./create_ssh_key_response | jq -r '.ssh_key.id')
    - >
      curl --fail-with-body \
        -H "Authorization: Bearer $HETZNER_API_KEY" \
        -X DELETE \
        "https://api.hetzner.cloud/v1/ssh_keys/$HETZNER_SSH_KEY_ID"
    - export HETZNER_SERVER_ID=$(cat ./create_server_response | jq -r '.server.id')
    - >
      curl --fail-with-body \
        -H "Authorization: Bearer $HETZNER_API_KEY" \
        -X DELETE \
        "https://api.hetzner.cloud/v1/servers/$HETZNER_SERVER_ID"

  script:
    - *build-deps
    - cargo install cargo-deb
    - PKG=$(cargo deb -p mosaic-chain-node --profile release --variant benchmark)

    - ssh-keyscan -H $HETZNER_SERVER_IP >> ~/.ssh/known_hosts
    - "scp $PKG root@$HETZNER_SERVER_IP:~/benchmark.deb"
    - ssh root@$HETZNER_SERVER_IP "dpkg --install ~/benchmark.deb && benchmark-runtime"
    - "scp -r $HETZNER_SERVER_IP:~/weights/* ./runtime/parachain/src/weights/pallet/"

    - git config user.email "update-benchmark-weights-bot@dlabs.hu"
    - git config user.name "Update Benchmark Weights Bot"
    - git remote set-url --push origin "https://gitlab-ci:$GITLAB_CI_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
    - git add ./runtime/parachain/src/weights/pallet
    - git commit -m 'Update benchmark weights'
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  
.debian:
  image: rust:1.88.0-bookworm
  before_script:
   - *build-deps
   - apt install apt-transport-https ca-certificates gnupg curl -y
   - curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
   - echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
   - apt update -y && apt install google-cloud-cli -y
   - cargo install cargo-deb
   - gcloud auth activate-service-account --key-file $GCP_ARTIFACT_REGISTRY_WRITE_JSON_KEY
   - gcloud config set core/project mosaicchain-general
   - gcloud config set artifacts/location europe
   # Doing this so enables versioning them separately and let's us reuse cargo pkgid instead of looking into the workspace's Cargo.toml
   - DEBIAN_VERSION_SOLO="$(cargo pkgid -p mosaic-testnet-solo-node | cut -d'@' -f2).$CI_PIPELINE_IID+$CI_COMMIT_SHORT_SHA"
   - DEBIAN_VERSION_PARA="$(cargo pkgid -p mosaic-chain-node | cut -d'@' -f2).$CI_PIPELINE_IID+$CI_COMMIT_SHORT_SHA"

publish-docker:
  extends: .docker-setup
  stage: publish
  needs:
    - test
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == 'true'
  script:
    - docker build -f Dockerfile.testnet-solo-local -t $DOCKER_REGISTRY/mosaic-chain-solo-local:$CI_COMMIT_SHORT_SHA -t $DOCKER_REGISTRY/mosaic-chain-solo-local:latest .
    - docker push $DOCKER_REGISTRY/mosaic-chain-solo-local:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_REGISTRY/mosaic-chain-solo-local:latest

publish-debian:
  extends: .debian
  stage: publish
  needs:
    - test
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == 'true'
  script:
    # solo
    - PKG_SOLO=$(cargo deb -p mosaic-testnet-solo-node --profile release --deb-version "$DEBIAN_VERSION_SOLO")
    - gcloud artifacts apt upload apt-canary-repository --source $PKG_SOLO

    # para
    - PKG_PARA=$(cargo deb -p mosaic-chain-node --profile release --deb-version "$DEBIAN_VERSION_PARA")
    - gcloud artifacts apt upload apt-canary-repository --source $PKG_PARA

.release-docker:
  extends: .docker-tag
  needs:
    - publish-docker
  variables:
    DOCKER_PROJECT: mosaic-chain-solo-local

.release-debian:
  extends: .debian
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == 'true'
      when: manual
    - when: never
  needs:
    - publish-debian
  script:
    - ARTIFACT_LIST=$(gcloud artifacts files list --repository=apt-canary-repository --format="value(FILE)")

    # solo
    - PKG_SOLO=$(echo "$ARTIFACT_LIST" | grep "pool/mosaic-testnet-solo_$DEBIAN_VERSION_SOLO")
    - '[ -z "$PKG_SOLO" ] && echo "No matching APT package found." && exit 1'
    - FILENAME_SOLO=$(basename "$PKG_SOLO")
    - gcloud artifacts files download --repository=apt-canary-repository --destination="./" --location=europe --local-filename="$FILENAME_SOLO" "$PKG_SOLO"
    - gcloud artifacts apt upload $DEBIAN_REPOSITORY --source="./$FILENAME_SOLO"

    # para
    - PKG_PARA=$(echo "$ARTIFACT_LIST" | grep "pool/mosaic-chain-node_$DEBIAN_VERSION_PARA")
    - '[ -z "$PKG_PARA" ] && echo "No matching APT package found." && exit 1'
    - FILENAME_PARA=$(basename "$PKG_PARA")
    - gcloud artifacts files download --repository=apt-canary-repository --destination="./" --location=europe --local-filename="$FILENAME_PARA" "$PKG_PARA"
    - gcloud artifacts apt upload $DEBIAN_REPOSITORY --source="./$FILENAME_PARA"

release-docker-testnet:
  extends: .release-docker
  stage: release-testnet
  variables:
    DOCKER_TAG: testnet
  environment:
    name: testnet

release-docker-devnet:
  extends: .release-docker
  stage: release-devnet
  needs:
    - release-docker-testnet
  variables:
    DOCKER_TAG: devnet
  environment:
    name: devnet

release-docker-mainnet:
  extends: .release-docker
  stage: release-mainnet
  needs:
    - release-docker-devnet
  variables:
    DOCKER_TAG: mainnet
  environment:
    name: mainnet

release-debian-testnet:
  extends: .release-debian
  stage: release-testnet
  variables:
    DEBIAN_REPOSITORY: apt-testnet-repository
  environment:
    name: testnet
    
release-debian-devnet:
  extends: .release-debian
  stage: release-devnet
  needs:
    - release-debian-testnet
  variables:
    DEBIAN_REPOSITORY: apt-devnet-repository
  environment:
    name: devnet

release-debian-mainnet:
  extends: .release-debian
  stage: release-mainnet
  needs:
    - release-debian-devnet
  variables:
    DEBIAN_REPOSITORY: apt-mainnet-repository
  environment:
    name: mainnet

clickup-testnet:
  extends: .clickup-network
  stage: release-testnet
  needs:
    - publish-docker
    - publish-debian
  variables:
    NETWORK: testnet
    TAG: blockchain

clickup-devnet:
  extends: .clickup-network
  stage: release-devnet
  needs:
    - clickup-testnet
  variables:
    NETWORK: devnet
    TAG: blockchain
    
clickup-mainnet:
  extends: .clickup-network
  stage: release-mainnet
  needs:
    - clickup-devnet
  variables:
    NETWORK: mainnet
    TAG: blockchain

