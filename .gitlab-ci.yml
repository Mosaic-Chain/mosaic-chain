stages:
  - build
  - test
  - release

.build-deps:
  image: rust:bookworm
  before_script:
    - apt update -y
    - apt upgrade -y
    - apt install build-essential git librocksdb-dev libsnappy-dev libclang-dev clang g++-multilib protobuf-compiler -y
    - rustup target add wasm32-unknown-unknown

build:
  stage: build
  extends: .build-deps
  script:
   - cargo build --release
  artifacts:
    expire_in: 1h
    paths:
      - target/release/mosaic-testnet-solo

test:
  stage: test
  extends: .build-deps
  script:
    - rustup component add rustfmt clippy
    - cargo install cargo-nextest
    - cargo fmt -- --check
    - cargo clippy --color=always --tests --examples --bins --benches --release --features runtime-benchmarks,try-runtime --no-deps -- -D warnings
    - cargo nextest run --release --features try-runtime

.debian-repo-setup:
  stage: release
  image: google/cloud-sdk:latest
  dependencies:
   - build
  before_script:
   - gcloud auth activate-service-account --key-file $GCP_DEB_DEPLOY_JSON_KEY
   - gcloud config set core/project dlabs-317612
   - gcloud config set artifacts/location europe-west3
   - gcloud config set artifacts/repository deb-repo

debian-rc:
  extends: .debian-repo-setup
  only:
    - develop
  script:
    - cd packaging/release-candidate
    - PKG=$(./make-package.sh)
    - gcloud artifacts apt upload deb-repo --source $PKG
    
debian-latest:
  extends: .debian-repo-setup
  only:
    - main
  script:
    - cd packaging/release
    - PKG=$(./make-package.sh)
    - gcloud artifacts apt upload deb-repo --source $PKG

docker-rc:
  stage: release
  image: docker:stable
  only:
    - develop
  dependencies:
    - build
  services:
    - docker:dind
  script:
    # Gitlab images
    - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -f Dockerfile -t $CI_REGISTRY_IMAGE/app:rc .
    - docker build -f Dockerfile.local-testnet -t $CI_REGISTRY_IMAGE/app:rc-local-testnet .
    - docker push $CI_REGISTRY_IMAGE/app:rc
    - docker push $CI_REGISTRY_IMAGE/app:rc-local-testnet
    # GCP images
    - docker tag $CI_REGISTRY_IMAGE/app:rc europe-west3-docker.pkg.dev/dlabs-317612/docker-registry/mosaic-testnet-solo:rc
    - cat $GCP_DEPLOY_JSON_KEY | docker login -u _json_key --password-stdin https://europe-west3-docker.pkg.dev
    - docker push europe-west3-docker.pkg.dev/dlabs-317612/docker-registry/mosaic-testnet-solo:rc

docker-latest:
  stage: release
  image: docker:stable
  dependencies:
    - build
  services:
    - docker:dind
  only:
    - main
  script:
    # Gitlab images
    - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -f Dockerfile -t $CI_REGISTRY_IMAGE/app:latest .
    - docker build -f Dockerfile.local-testnet -t $CI_REGISTRY_IMAGE/app:latest-local-testnet .
    - docker push $CI_REGISTRY_IMAGE/app:latest
    - docker push $CI_REGISTRY_IMAGE/app:latest-local-testnet
    # GCP images
    - docker tag $CI_REGISTRY_IMAGE/app:latest europe-west3-docker.pkg.dev/dlabs-317612/docker-registry/mosaic-testnet-solo:latest
    - cat $GCP_DEPLOY_JSON_KEY | docker login -u _json_key --password-stdin https://europe-west3-docker.pkg.dev
    - docker push europe-west3-docker.pkg.dev/dlabs-317612/docker-registry/mosaic-testnet-solo:latest
